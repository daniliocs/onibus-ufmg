const pontos=[

/* -----------------------------
UTILITÁRIOS
----------------------------- */

function minutos(hora){
  let p=hora.split(":");
  return parseInt(p[0])*60+parseInt(p[1]);
}

function formatarHoraMinuto(min) {
  let h = Math.floor(min / 60);
  let m = min % 60;
  let mStr = m < 10 ? "0" + m : m;
  
  if (h > 0) return h + "h" + mStr;
  return m + " min";
}

function formatarTempo(min){
  return "Faltam " + formatarHoraMinuto(min);
}
  
function distancia(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=
  Math.sin(dLat/2)*Math.sin(dLat/2)+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)*Math.sin(dLon/2);
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

function calcularTempoNoPonto(nomeDoPonto) {
  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();
  let horarios = horariosHoje(); 
  let menorEspera = null;

  for (let h of horarios) {
    let minSaida = minutos(h[0]);
    let origem = h[1];
    let tipo = h[2]; 
    
    let rota = rotaCampus;
    if (tipo === "passagem") {
      rota = rotaPassagem;
    } else if (origem.includes("Moradia")) {
      rota = rotaMoradia;
    }
  
    let pontoNaRota = rota.find(p => p.p === nomeDoPonto);
    
    if (pontoNaRota) {
      let minChegada = minSaida + pontoNaRota.t;
      if (minChegada > atualMin) {
        let espera = minChegada - atualMin;
        if (menorEspera === null || espera < menorEspera) {
          menorEspera = espera;
        }
      }
    }
  }
  return menorEspera;
}  

/* -----------------------------
GPS
----------------------------- */

function pontoMaisProximo(lat,lon){
  let melhor=null;
  let menor=999;
  for(let p of pontos){
    if(p.lat==null) continue;
    const d=distancia(lat,lon,p.lat,p.lon);
    if(d<menor){
      menor=d;
      melhor=p;
    }
  }
  return {ponto:melhor,dist:menor};
}

function pontoMaisProximoVolta(lat, lon) {
  let melhor = null;
  let menor = 999;
  let paradasDeVolta = rotaCampus.map(p => p.p).filter(nome => !nome.includes("Moradia"));

  for(let p of pontos) {
    if(p.lat == null) continue;
    if(!paradasDeVolta.includes(p.nome)) continue;

    const d = distancia(lat, lon, p.lat, p.lon);
    if(d < menor){
      menor = d;
      melhor = p;
    }
  }
  return {ponto: melhor, dist: menor};
}

function calcularTempoVolta(nomeDoPonto) {
  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();
  let horarios = horariosHoje(); 
  let menorEspera = null;

  for (let h of horarios) {
    let minSaida = minutos(h[0]);
    let origem = h[1];
    
    if (origem.includes("Moradia")) continue; 
    
    let rota = (h[2] === "passagem") ? rotaPassagem : rotaCampus;
    let pontoNaRota = rota.find(p => p.p === nomeDoPonto);
    
    if (pontoNaRota) {
      let minChegada = minSaida + pontoNaRota.t;
      if (minChegada > atualMin) {
        let espera = minChegada - atualMin;
        if (menorEspera === null || espera < menorEspera) {
          menorEspera = espera;
        }
      }
    }
  }
  return menorEspera;
}

function descobrirVolta() {
  const btn = document.getElementById("btnVolta");
  const visor = document.getElementById("resultadoVolta");
  const divMapaVolta = document.getElementById("mapaVolta");

  if(!navigator.geolocation){
    visor.innerText = "GPS não suportado pelo seu navegador.";
    return;
  }

  btn.innerText = "⏳ Buscando sua posição...";

  navigator.geolocation.getCurrentPosition(
    function(pos){
      btn.innerText = "🧭 Atualizar ponto de volta";
      
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      let r = pontoMaisProximoVolta(lat, lon);
      
      if(!r.ponto) {
        visor.innerHTML = "Não foi possível calcular as rotas de volta.";
        return;
      }

      let espera = calcularTempoVolta(r.ponto.nome);

      if(espera !== null) {
        visor.innerHTML = 
          "Caminhe até o ponto <b>" + r.ponto.nome + "</b> (" + (r.dist * 1000).toFixed(0) + " m).<br><br>" +
          "🚌 O próximo ônibus passa lá em: <span style='color:#e67e22; font-size:22px; font-weight:bold;'>" + formatarHoraMinuto(espera) + "</span>";
      } else {
        visor.innerHTML = 
          "Caminhe até o ponto <b>" + r.ponto.nome + "</b>.<br>" +
          "<span style='color:red;'>🚫 Não há mais ônibus voltando hoje.</span>";
      }

      divMapaVolta.style.display = "block";
      
      if(mapaVolta === null) {
        mapaVolta = L.map('mapaVolta').setView([lat, lon], 15); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 18,
          attribution: '© OpenStreetMap'
        }).addTo(mapaVolta);
      }

      setTimeout(() => {
        mapaVolta.invalidateSize();
      }, 200);

      if (controleRotaVolta !== null) {
        mapaVolta.removeControl(controleRotaVolta);
      }

      controleRotaVolta = L.Routing.control({
        waypoints: [
          L.latLng(lat, lon), 
          L.latLng(r.ponto.lat, r.ponto.lon) 
        ],
        router: L.Routing.osrmv1({
          profile: 'foot' 
        }),
        lineOptions: {
          styles: [{color: '#e67e22', opacity: 0.8, weight: 6}]
        },
        show: false,
        addWaypoints: false, 
        routeWhileDragging: false,
        fitSelectedRoutes: true
      }).addTo(mapaVolta);
      
      if(marcadorUsuarioVolta === null){
        marcadorUsuarioVolta = L.circleMarker([lat, lon], {
          color: 'blue', fillColor: '#3388ff', fillOpacity: 0.8, radius: 8
        }).addTo(mapaVolta).bindPopup("Você está aqui").openPopup();
      } else {
        marcadorUsuarioVolta.setLatLng([lat, lon]);
      }

    },
    function(err){
      btn.innerText = "🧭 Encontrar ponto de volta";
      if(err.code === 1) {
        visor.innerHTML = "<span style='color:red;'>Permissão negada. Ative a localização no seu navegador.</span>";
      } else {
        visor.innerHTML = "<span style='color:red;'>Não foi possível obter a localização.</span>";
      }
    },
    { enableHighAccuracy: true }
  );
}

let gpsWatchId = null;
let meuMapa = null;
let marcadorUsuario = null;

let mapaVolta = null;
let controleRotaVolta = null;

function usarGPS(){
  const botao = document.querySelector("button[onclick='usarGPS()']");
  const visor = document.getElementById("gps");
  const divMapa = document.getElementById("mapa");

  if(!navigator.geolocation){
    visor.innerText = "GPS não suportado";
    return;
  }

  if(gpsWatchId !== null){
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
    botao.innerHTML = "📍 Usar minha localização";
    botao.style.background = "#006633";
    visor.innerHTML = "Atualização do GPS pausada.";
    divMapa.style.display = "none"; 
    return;
  }

  visor.innerText = "Obtendo localização e carregando mapa...";
  botao.innerHTML = "🛑 Parar localização";
  botao.style.background = "#cc0000";
  divMapa.style.display = "block"; 

  if(meuMapa === null) {
    meuMapa = L.map('mapa').setView([-19.8690, -43.9664], 14); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '© OpenStreetMap'
    }).addTo(meuMapa);

    pontos.forEach(p => {
      if(p.lat !== null && p.lon !== null){
        L.marker([p.lat, p.lon])
         .addTo(meuMapa)
         .bindPopup("<b>" + p.nome + "</b>");
      }
    });
  }

  gpsWatchId = navigator.geolocation.watchPosition(
    function(pos){
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      let r = pontoMaisProximo(lat,lon);
      let espera = calcularTempoNoPonto(r.ponto.nome);
      
      let textoEspera = espera !== null 
        ? "<br><br>🚌 Próximo ônibus aqui em:<br><span style='font-size:24px; color:#006633; font-weight:bold;'>" + formatarHoraMinuto(espera) + "</span>" 
        : "<br><br><span style='font-size:16px; color:red;'>🚫 Sem mais ônibus neste ponto hoje</span>";

      visor.innerHTML =
        "📍 Ponto mais próximo: <b>" + r.ponto.nome + "</b> (" + (r.dist * 1000).toFixed(0) + " m)" + 
        textoEspera;

      if(marcadorUsuario === null){
        marcadorUsuario = L.circleMarker([lat, lon], {
          color: 'blue', fillColor: '#3388ff', fillOpacity: 0.8, radius: 8
        }).addTo(meuMapa).bindPopup("Você está aqui").openPopup();
      } else {
        marcadorUsuario.setLatLng([lat, lon]);
      }
      
      if(r.ponto.lat !== null) {
        let grupo = new L.featureGroup([marcadorUsuario, L.marker([r.ponto.lat, r.ponto.lon])]);
        meuMapa.fitBounds(grupo.getBounds(), {padding: [30, 30]});
      } else {
        meuMapa.setView([lat, lon], 16);
      }
    },
    function(){
      visor.innerText = "Não foi possível obter a localização";
      navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = null;
      botao.innerHTML = "📍 Usar minha localização";
      botao.style.background = "#006633";
    },
    { enableHighAccuracy: true }
  );
}

/* -----------------------------
HORÁRIOS DO DIA E PRÓXIMOS
----------------------------- */

const feriadosBH = [
  "01/01", "21/04", "01/05", "15/08", "07/09", 
  "12/10", "02/11", "15/11", "08/12", "25/12"  
];

function ehFeriado(dataObj) {
  let dia = ("0" + dataObj.getDate()).slice(-2);
  let mes = ("0" + (dataObj.getMonth() + 1)).slice(-2);
  return feriadosBH.includes(dia + "/" + mes);
}

function obterHorarios(dataObj){
  if (ehFeriado(dataObj)) return []; 

  let diaDaSemana = dataObj.getDay();
  if(diaDaSemana >= 1 && diaDaSemana <= 5) return horariosSemana;
  if(diaDaSemana == 6) return horariosSabado;
  
  return []; 
}

function horariosHoje(){
  return obterHorarios(new Date());
}

/* -----------------------------
INTERFACE
----------------------------- */

function listarHorarios(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  let horarios = horariosHoje();

  if(horarios.length == 0){
    lista.innerHTML="<li>🚫 Não há ônibus hoje</li>";
    return;
  }

  // Filtragem e criação da lista
  let temHorarioNoFiltro = false;

  horarios.forEach(h => {
    let hora = h[0];
    let origem = h[1];
    let tipo = h[2];
    
    // Lógica do filtro
    if (filtroAtual === 'passagem' && tipo !== 'passagem') return;
    if (filtroAtual === 'moradia' && (tipo === 'passagem' || !origem.includes('Moradia'))) return;
    if (filtroAtual === 'escola' && !origem.includes('Escola')) return;

    temHorarioNoFiltro = true;
    let li = document.createElement("li");

    // Aplicação das tags coloridas na lista
    if(tipo === "passagem" && origem.includes("Moradia")){
      li.innerHTML = `<b>${hora}</b> — <span class="tag-passagem">Passando na Moradia</span>`;
    } else if (origem.includes("Moradia")) {
      li.innerHTML = `<b>${hora}</b> — Saída <span class="tag-moradia">Moradia</span>`;
    } else {
      li.innerHTML = `<b>${hora}</b> — Saída <span class="tag-escola">${origem}</span>`;
    }

    lista.appendChild(li);
  });

  // Caso o usuário clique no filtro e não tenha mais nenhum ônibus daquele tipo pro dia
  if (!temHorarioNoFiltro) {
    lista.innerHTML = "<li>Nenhum ônibus desta rota cadastrado para hoje.</li>";
  }
}

function mostrarChegadas(saida, origem, hora, tipo) { 
  let lista = document.getElementById("chegadas");
  lista.innerHTML = "";

  document.getElementById("infoViagem").innerHTML =
    "Previsão baseada no ônibus das " + hora + " (saída: " + origem + ")";

  let rota = rotaCampus;
  if (tipo === "passagem") {
    rota = rotaPassagem;
  } else if (origem.includes("Moradia")) {
    rota = rotaMoradia;
  }
  
  rota.forEach(p => {
    let min = saida + p.t;
    let h = Math.floor(min / 60);
    let m = min % 60;
    if(m < 10) m = "0" + m;

    let li = document.createElement("li");
    li.innerHTML = "<b>" + h + ":" + m + "</b> - " + p.p;
    lista.appendChild(li);
  });
}

/* -----------------------------
PRÓXIMO ÔNIBUS
----------------------------- */

function atualizar(){
  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();
  let horarios = obterHorarios(agora);
  let proximo = null;
  let ultimo = null;

  horarios.forEach(h => {
    let min = minutos(h[0]);
    if(min > atualMin && !proximo){
      proximo = {hora: h[0], origem: h[1], min: min, quando: "hoje", tipo: h[2], qtd: h[3]};
    }
    if(min <= atualMin){
      ultimo = {hora: h[0], origem: h[1], min: min, tipo: h[2], qtd: h[3]};
    }
  });

  if(!proximo){
    let diasNomes = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
    for(let i = 1; i <= 7; i++){
      let dataFutura = new Date();
      dataFutura.setDate(agora.getDate() + i);
      let horariosFuturos = obterHorarios(dataFutura);
      if(horariosFuturos.length > 0){
        let h = horariosFuturos[0]; 
        let textoDia = (i === 1) ? "Amanhã" : diasNomes[dataFutura.getDay()];
        proximo = {hora: h[0], origem: h[1], quando: textoDia, tipo: h[2], qtd: h[3]};
        break; 
      }
    }
  }

  if (proximo) {
    let qtdTexto = proximo.qtd > 1 ? proximo.qtd + " veículos" : proximo.qtd + " veículo";
    document.getElementById("qtd-onibus").innerHTML = "🚌 " + qtdTexto;
    document.getElementById("qtd-onibus").style.display = "inline-block";

    // Criando a tag colorida para o "Próximo ônibus" também
    let tagHtml = "";
    if (proximo.tipo === "passagem" && proximo.origem.includes("Moradia")) {
      tagHtml = `<span class="tag-passagem">Passando na Moradia</span>`;
    } else if (proximo.origem.includes("Moradia")) {
      tagHtml = `<span class="tag-moradia">Moradia</span>`;
    } else {
      tagHtml = `<span class="tag-escola">${proximo.origem}</span>`;
    }

    if (proximo.quando === "hoje") {
      let falta = proximo.min - atualMin;
      let ehOUltimo = (proximo.hora === horarios[horarios.length - 1][0]);
      let etiquetaAviso = ehOUltimo 
        ? "<div style='background:#cc0000; color:white; padding:6px 10px; border-radius:6px; font-size:14px; font-weight:bold; display:inline-block; margin-bottom:8px;'>⚠️ ATENÇÃO: ÚLTIMO ÔNIBUS DE HOJE</div><br>" 
        : "";

      document.getElementById("proximo").innerHTML = etiquetaAviso + "🚌 " + proximo.hora;
      document.getElementById("tempo").innerText = formatarTempo(falta);
      
      // Aplica a tag aqui
      if (proximo.tipo === "passagem") {
        document.getElementById("origem").innerHTML = tagHtml;
      } else {
        document.getElementById("origem").innerHTML = "Saída: " + tagHtml;
      }
      
    } else {
      let tinhaOnibusHoje = horarios.length > 0;
      let msgErro = tinhaOnibusHoje 
        ? "⚠️ Último ônibus do dia já saiu" 
        : "🚫 Não há ônibus hoje (Domingo/Feriado)";

      document.getElementById("proximo").innerHTML = 
        "<span style='font-size: 20px; color: #cc0000;'>" + msgErro + "</span><br>"+
        "<span class='texto-dia-seguinte' style='font-size: 22px; margin-top: 10px; display: block;'>Próximo: " + proximo.quando.toLowerCase() + " às " + proximo.hora + "</span>";
      
      if (proximo.tipo === "passagem") {
        document.getElementById("origem").innerHTML = tagHtml;
      } else {
        document.getElementById("origem").innerHTML = "Saída: " + tagHtml;
      }
      
      document.getElementById("tempo").innerText = ""; 
    }
  } else {
    document.getElementById("proximo").innerHTML = "🚫 Sem previsão de ônibus";
    document.getElementById("origem").innerText = "";
    document.getElementById("tempo").innerText = "";
    document.getElementById("qtd-onibus").style.display = "none";
  }

  if (ultimo) {
    let rotaUltimo = (ultimo.origem.includes("Moradia")) ? rotaMoradia : rotaCampus;
    let tempoTotalViagem = rotaUltimo[rotaUltimo.length - 1].t; 
    let minutoFimDaViagem = ultimo.min + tempoTotalViagem;

    if (atualMin <= minutoFimDaViagem) {
      mostrarChegadas(ultimo.min, ultimo.origem, ultimo.hora, ultimo.tipo);
    } 
    else if (proximo && proximo.quando === "hoje") {
      mostrarChegadas(proximo.min, proximo.origem, proximo.hora, proximo.tipo);
    } 
    else {
      document.getElementById("chegadas").innerHTML = "<li>Viagens encerradas no momento.</li>";
      document.getElementById("infoViagem").innerHTML = "";
    }
  } 
  else if (proximo && proximo.quando === "hoje") {
    mostrarChegadas(proximo.min, proximo.origem, proximo.hora, proximo.tipo); 
  } else {
    document.getElementById("chegadas").innerHTML = "<li>Aguardando início das viagens...</li>";
    document.getElementById("infoViagem").innerHTML = "";
  }

  estimarPosicaoOnibus();
} 

let marcadorOnibus = null;

function estimarPosicaoOnibus() {
  if (meuMapa === null) return; 

  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();
  
  if (!ultimo) return; 

  let rota = rotaCampus;
  if (ultimo.tipo === "passagem") {
    rota = rotaPassagem;
  } else if (ultimo.origem.includes("Moradia")) {
    rota = rotaMoradia;
  }
  
  let tempoTotal = rota[rota.length - 1].t;
  let minutoFim = ultimo.min + tempoTotal;

  if (atualMin > minutoFim) {
    if (marcadorOnibus) {
      meuMapa.removeLayer(marcadorOnibus);
      marcadorOnibus = null;
    }
    return;
  }

  let tempoDecorrido = atualMin - ultimo.min;
  let pontoAnterior = rota[0];
  let pontoProximo = rota[rota.length - 1];

  for (let i = 0; i < rota.length - 1; i++) {
    if (tempoDecorrido >= rota[i].t && tempoDecorrido < rota[i+1].t) {
      pontoAnterior = rota[i];
      pontoProximo = rota[i+1];
      break;
    }
  }

  let coordAnt = pontos.find(p => p.nome === pontoAnterior.p);
  let coordProx = pontos.find(p => p.nome === pontoProximo.p);

  if (coordAnt && coordProx && coordAnt.lat !== null && coordProx.lat !== null) {
    let tempoTrecho = pontoProximo.t - pontoAnterior.t;
    let tempoAndadoTrecho = tempoDecorrido - pontoAnterior.t;
    let porcentagem = tempoAndadoTrecho / tempoTrecho;

    let latAtual = coordAnt.lat + ((coordProx.lat - coordAnt.lat) * porcentagem);
    let lonAtual = coordAnt.lon + ((coordProx.lon - coordAnt.lon) * porcentagem);

    if (!marcadorOnibus) {
      let iconeBus = L.divIcon({
        html: '🚌',
        className: '',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });
      marcadorOnibus = L.marker([latAtual, lonAtual], {icon: iconeBus}).addTo(meuMapa);
      marcadorOnibus.bindPopup("<b>Ônibus das " + ultimo.hora + "</b><br>Estimativa em tempo real");
    } else {
      marcadorOnibus.setLatLng([latAtual, lonAtual]);
    }
  }
}

/* -----------------------------
INICIALIZAÇÃO
----------------------------- */
listarHorarios();
atualizar();
setInterval(atualizar, TEMPO_ATUALIZACAO);
