<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ônibus Moradias UFMG</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
color:#006633;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#proximo{
font-size:26px;
color:#d40000;
font-weight:bold;
}

ul{
padding-left:20px;
}

li{
margin:5px 0;
font-size:16px;
}

.origem{
font-weight:bold;
color:#006633;
}

.noturno{
color:#b36b00;
font-style:italic;
}

</style>

</head>

<body>

<h1>🚌 Ônibus Moradias UFMG</h1>

<div class="card">

<h2>Próximo ônibus</h2>

<div id="proximo"></div>
<div id="origem"></div>
<div id="extra"></div>
<div id="tempo"></div>

</div>

<div class="card">

<h2>Rota</h2>

<p>
Escola de Música → FaE → FACE → Reitoria → CAD1 → Farmácia →
Odonto → Educação Física → Ouro Preto →
Moradia 1 → Moradia 2 → Moradia 3 → retorno UFMG
</p>

</div>

<div class="card">

<h2>Horários</h2>

<ul id="lista"></ul>

</div>

<div class="card">

<h2>Mapa da rota</h2>

<iframe
width="100%"
height="350"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps/dir/Escola+de+Música+UFMG/FaE+UFMG/FACE+UFMG/Reitoria+UFMG/CAD+1+UFMG/Faculdade+de+Farmácia+UFMG/Odontologia+UFMG/Educação+Física+UFMG/Moradia+Universitária+UFMG">
</iframe>

</div>

<script>

const horarios=[

{hora:"06:45",origem:"Moradia"},
{hora:"07:20",origem:"Escola de Música"},
{hora:"07:40",origem:"Moradia"},
{hora:"10:00",origem:"Escola de Música"},
{hora:"11:00",origem:"Moradia"},
{hora:"11:50",origem:"Escola de Música"},
{hora:"12:15",origem:"Moradia"},
{hora:"13:10",origem:"Escola de Música"},
{hora:"13:30",origem:"Moradia"},
{hora:"15:00",origem:"Escola de Música"},
{hora:"15:20",origem:"Moradia"},
{hora:"17:00",origem:"Escola de Música"},
{hora:"17:20",origem:"Moradia"},
{hora:"17:50",origem:"Escola de Música"},
{hora:"18:20",origem:"Moradia"},

{hora:"19:00",origem:"Escola de Música",noturno:true},
{hora:"19:40",origem:"Escola de Música",noturno:true},
{hora:"21:00",origem:"Escola de Música",noturno:true},
{hora:"21:35",origem:"Escola de Música",noturno:true},
{hora:"22:15",origem:"Escola de Música",noturno:true},
{hora:"22:50",origem:"Escola de Música",noturno:true}

];

const lista=document.getElementById("lista");

horarios.forEach(h=>{

let li=document.createElement("li");

let texto=h.hora+" — Saída "+h.origem;

if(h.noturno){

texto+=" (passa nas moradias)";

}

li.innerText=texto;

lista.appendChild(li);

});

function atualizar(){

let agora=new Date();

let atualMin=agora.getHours()*60+agora.getMinutes();

for(let h of horarios){

let p=h.hora.split(":");

let min=parseInt(p[0])*60+parseInt(p[1]);

if(min>atualMin){

let falta=min-atualMin;

document.getElementById("proximo").innerText="🚌 "+h.hora;

document.getElementById("origem").innerText=
"Saída: "+h.origem;

if(h.noturno){

document.getElementById("extra").innerText=
"Passa nas moradias (17-25 min após saída)";

}else{

document.getElementById("extra").innerText="";

}

document.getElementById("tempo").innerText=
"Faltam "+falta+" minutos";

return;

}

}

document.getElementById("proximo").innerText="Sem ônibus hoje";

document.getElementById("tempo").innerText="";

}

setInterval(atualizar,10000);

atualizar();

</script>

</body>
</html>
