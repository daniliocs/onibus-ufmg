<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ônibus Moradias UFMG</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
color:#006633;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#proximo{
font-size:26px;
font-weight:bold;
}

.verde{color:green}
.amarelo{color:#c98a00}
.vermelho{color:red}

ul{
padding-left:20px;
}

li{
margin:5px 0;
}

</style>

</head>

<body>

<h1>🚌 Ônibus Moradias UFMG</h1>

<div class="card">

<h2>Próximo ônibus</h2>

<div id="proximo"></div>
<div id="origem"></div>
<div id="tempo"></div>
<div id="posicao"></div>

</div>

<div class="card">

<h2>Chegada estimada nos pontos</h2>

<div id="infoViagem" style="margin-bottom:10px;font-weight:bold;"></div>

<ul id="chegadas"></ul>

</div>

<div class="card">

<h2>Horários</h2>

<ul id="lista"></ul>

</div>

<div class="card">

<h2>Mapa da rota</h2>

<iframe
width="100%"
height="350"
style="border:0"
loading="lazy"
allowfullscreen
src="https://maps.google.com/maps?q=UFMG&t=&z=14&output=embed">
</iframe>

</div>

<script>

const pontos=[

{nome:"Escola de Música",t:0},
{nome:"FaE",t:3},
{nome:"FACE",t:5},
{nome:"Reitoria",t:7},
{nome:"CAD1",t:9},
{nome:"Farmácia",t:11},
{nome:"Odonto",t:13},
{nome:"Educação Física",t:15},
{nome:"Moradia 1",t:18},
{nome:"Moradia 2",t:21},
{nome:"Moradia 3",t:23}

];

const horarios=[

{hora:"06:45",origem:"Moradia"},
{hora:"07:20",origem:"Escola de Música"},
{hora:"07:40",origem:"Moradia"},
{hora:"10:00",origem:"Escola de Música"},
{hora:"11:00",origem:"Moradia"},
{hora:"11:50",origem:"Escola de Música"},
{hora:"12:15",origem:"Moradia"},
{hora:"13:10",origem:"Escola de Música"},
{hora:"13:30",origem:"Moradia"},
{hora:"15:00",origem:"Escola de Música"},
{hora:"15:20",origem:"Moradia"},
{hora:"17:00",origem:"Escola de Música"},
{hora:"17:20",origem:"Moradia"},
{hora:"17:50",origem:"Escola de Música"},
{hora:"18:20",origem:"Moradia"},
{hora:"19:00",origem:"Escola de Música",noturno:true},
{hora:"19:40",origem:"Escola de Música",noturno:true},
{hora:"21:00",origem:"Escola de Música",noturno:true},
{hora:"21:35",origem:"Escola de Música",noturno:true},
{hora:"22:15",origem:"Escola de Música",noturno:true},
{hora:"22:50",origem:"Escola de Música",noturno:true}

];

const lista=document.getElementById("lista");

horarios.forEach(h=>{

let li=document.createElement("li");

let txt=h.hora+" — Saída "+h.origem;

if(h.noturno){

txt+=" (passa nas moradias)";

}

li.innerText=txt;

lista.appendChild(li);

});

function atualizar(){

let agora=new Date();

let atualMin=agora.getHours()*60+agora.getMinutes();

for(let h of horarios){

let p=h.hora.split(":");

let min=parseInt(p[0])*60+parseInt(p[1]);

if(min>atualMin){

let falta=min-atualMin;

let cor="vermelho";

let icon="🔴";

if(falta<8){

cor="verde";
icon="🟢";

}else if(falta<15){

cor="amarelo";
icon="🟡";

}

document.getElementById("proximo").innerHTML=
icon+" "+h.hora;

document.getElementById("origem").innerText=
"Saída: "+h.origem;

document.getElementById("tempo").className=cor;

document.getElementById("tempo").innerText=
"Faltam "+falta+" minutos";

mostrarChegadas(min, h.origem, h.hora);

return;

}

}

}

function mostrarChegadas(saida, origem, hora){

let lista=document.getElementById("chegadas");

lista.innerHTML="";

document.getElementById("infoViagem").innerHTML =
"Previsão baseada no ônibus das <b>"+hora+
"</b> (saída: "+origem+")";

pontos.forEach(p=>{

let min=saida+p.t;

let h=Math.floor(min/60);

let m=min%60;

if(m<10)m="0"+m;

let li=document.createElement("li");

li.innerText=p.nome+" → "+h+":"+m;

lista.appendChild(li);

});

}
setInterval(atualizar,10000);

atualizar();

</script>

</body>

</html>
