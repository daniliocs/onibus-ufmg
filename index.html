<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ônibus Moradias UFMG</title>

  

<style>



  /* Estilo de Linha do Tempo para as paradas */
#chegadas {
  list-style: none;
  padding-left: 20px;
  border-left: 3px solid #006633;
  margin-left: 10px;
}

#chegadas li {
  position: relative;
  padding-bottom: 15px;
  font-size: 16px;
  color: #333;
}

/* Bolinha marcadora da linha do tempo */
#chegadas li::before {
  content: '';
  position: absolute;
  left: -28px; /* Ajusta a bolinha para cima da linha */
  top: 2px;
  width: 12px;
  height: 12px;
  background: white;
  border: 3px solid #006633;
  border-radius: 50%;
}

/* Tira a linha extra do último item */
#chegadas li:last-child {
  padding-bottom: 0;
}

  


  
body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
color:#006633;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#proximo{
font-size:26px;
font-weight:bold;
}

.verde{color:green}
.amarelo{color:#c98a00}
.vermelho{color:red}

</style>

</head>

<body>

<h1>🚌 Ônibus Moradias UFMG</h1>

<div class="card">
<h2>Próximo ônibus</h2>
<div id="proximo"></div>
<div id="origem"></div>
<div id="tempo"></div>
</div>

<div class="card">
<h2>Chegada estimada nos pontos</h2>
<div id="infoViagem"></div>
<ul id="chegadas"></ul>
</div>

<div class="card">
<h2>Horários de hoje</h2>
<ul id="lista"></ul>
</div>

<div class="card">
<h2>Ponto mais próximo</h2>

<button onclick="usarGPS()" style="
padding:10px 14px;
font-size:16px;
border:none;
border-radius:8px;
background:#006633;
color:white;
cursor:pointer;
margin-bottom:10px;
">
📍 Usar minha localização
</button>

<div id="gps">Clique no botão para detectar sua posição</div>

</div>

<script>

/* -----------------------------
CONFIGURAÇÕES
----------------------------- */

const TEMPO_ATUALIZACAO=10000;


/* -----------------------------
ROTAS
----------------------------- */
const rotaCampus=[

{p:"Escola de Música",t:0},
{p:"Belas Artes",t:1},
{p:"FaE",t:3},
{p:"RU 1",t:4},
{p:"FACE",t:5},
{p:"Reitoria",t:7},
{p:"CAD 1",t:9},
{p:"Farmácia",t:11},
{p:"Veterinária",t:12},
{p:"Odonto",t:13},
{p:"Educação Física",t:15},
{p:"Moradia 1",t:21},
{p:"Moradia 2 e 3",t:24}

];

const rotaMoradia=[

{p:"Moradia 1",t:0},
{p:"Moradia 2 e 3",t:2},
{p:"Educação Física",t:7},
{p:"Odonto",t:9},
{p:"Veterinária",t:10},
{p:"Farmácia",t:11},
{p:"RU 2",t:12},
{p:"Engenharia",t:14},
{p:"RU 1",t:16},
{p:"FaE",t:18},
{p:"Belas Artes",t:20},
{p:"Escola de Música",t:22}

];


/* -----------------------------
HORÁRIOS
----------------------------- */

const horariosSemana=[

["06:45","Moradia"],
["07:20","Escola de Música"],
["07:40","Moradia"],
["10:00","Escola de Música"],
["11:00","Moradia"],
["11:50","Escola de Música"],
["12:15","Moradia"],
["13:10","Escola de Música"],
["13:30","Moradia"],
["15:00","Escola de Música"],
["15:20","Moradia"],
["17:00","Escola de Música"],
["17:20","Moradia"],
["17:50","Escola de Música"],
["18:20","Moradia"],
["19:00","Escola de Música"],
["19:25","Moradias","passagem"],
["19:40","Escola de Música"],
["20:05","Moradias","passagem"],
["21:00","Escola de Música"],
["21:25","Moradias","passagem"],
["21:35","Escola de Música"],
["21:50","Moradias","passagem"],
["22:15","Escola de Música"],
["22:40","Moradias","passagem"],
["22:50","Escola de Música"],
["23:15","Moradias","passagem"]

];


const horariosSabado = [
  ["07:40", "Moradia"], 
  ["10:00", "Escola de Música"], 
  ["11:00", "Moradia"],
  ["12:00", "Escola de Música"],
  ["12:20", "Moradia"],
  ["13:30", "Escola de Música"]
];


/* -----------------------------
PONTOS PARA GPS
----------------------------- */

const pontos=[

{nome:"Escola de Música",lat:-19.8621,lon:-43.9618},
{nome:"Belas Artes",lat:null,lon:null},
{nome:"FaE",lat:-19.8682,lon:-43.9636},
{nome:"RU 1",lat:null,lon:null},
{nome:"FACE",lat:-19.8701,lon:-43.9686},
{nome:"Reitoria",lat:-19.8766,lon:-43.9762},
{nome:"CAD 1",lat:null,lon:null},
{nome:"Farmácia",lat:null,lon:null},
{nome:"Veterinária",lat:null,lon:null},
{nome:"Odonto",lat:null,lon:null},
{nome:"Educação Física",lat:null,lon:null},
{nome:"Moradia 1",lat:-19.8706,lon:-43.9862},
{nome:"Moradia 2 e 3",lat:-19.8661,lon:-43.9845},
{nome:"RU 2",lat:null,lon:null},
{nome:"Engenharia",lat:null,lon:null}

];


/* -----------------------------
UTILITÁRIOS
----------------------------- */

function minutos(hora){

let p=hora.split(":");
return parseInt(p[0])*60+parseInt(p[1]);

}

function formatarTempo(min){

let h=Math.floor(min/60);
let m=min%60;

if(h>0){

if(m<10)m="0"+m;
return "Faltam "+h+":"+m;

}

return "Faltam "+m+" min";

}

function distancia(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;
}


/* -----------------------------
GPS
----------------------------- */

function pontoMaisProximo(lat,lon){

let melhor=null;
let menor=999;

for(let p of pontos){

if(p.lat==null) continue;

const d=distancia(lat,lon,p.lat,p.lon);

if(d<menor){
menor=d;
melhor=p;
}

}

return {ponto:melhor,dist:menor};

}

  

// Variável global para guardar o "vídeo" do GPS
let gpsWatchId = null;

function usarGPS(){
  const botao = document.querySelector("button[onclick='usarGPS()']");
  const visor = document.getElementById("gps");

  if(!navigator.geolocation){
    visor.innerText = "GPS não suportado";
    return;
  }

  // Se o GPS já estiver ligado, o clique serve para desligar
  if(gpsWatchId !== null){
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
    
    // Volta o botão ao normal
    botao.innerHTML = "📍 Usar minha localização";
    botao.style.background = "#006633";
    visor.innerHTML = "Atualização do GPS pausada.";
    return;
  }

  // Se o GPS estiver desligado, vamos ligar
  visor.innerText = "Obtendo localização em tempo real...";
  
  // Muda a cara do botão para mostrar que está ativo e pode ser cancelado
  botao.innerHTML = "🛑 Parar rastreio de GPS";
  botao.style.background = "#cc0000";

  // Inicia o rastreio contínuo
  gpsWatchId = navigator.geolocation.watchPosition(
    function(pos){
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      let r = pontoMaisProximo(lat,lon);

      visor.innerHTML =
        "📍 Ponto mais próximo: <b>"+r.ponto.nome+"</b><br>"+
        "Distância: "+(r.dist*1000).toFixed(0)+" m<br>"+
        "<small style='color:green;'>Atualizando em tempo real...</small>";
    },
    function(){
      visor.innerText = "Não foi possível obter a localização";
      
      // Se der erro, desliga tudo e volta o botão ao normal
      navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = null;
      botao.innerHTML = "📍 Usar minha localização";
      botao.style.background = "#006633";
    },
    {
      enableHighAccuracy: true, // Força o celular a usar o GPS mais preciso
      maximumAge: 0 // Garante que não vai pegar posição velha do cache
    }
  );
}




  

/* -----------------------------
HORÁRIOS DO DIA E PRÓXIMOS
----------------------------- */

// Nova função: descobre a lista de horários de qualquer dia da semana (0 = Domingo, 6 = Sábado)
function obterHorarios(dia){
  if(dia >= 1 && dia <= 5) return horariosSemana;
  if(dia == 6) return horariosSabado;
  return [];
}

// Mantemos essa função para não quebrar a sua lista de "Horários de Hoje" na tela
function horariosHoje(){
  let dia = new Date().getDay();
  return obterHorarios(dia);
}


/* -----------------------------
INTERFACE
----------------------------- */

function listarHorarios(){

let lista=document.getElementById("lista");
lista.innerHTML="";

let horarios=horariosHoje();

if(horarios.length==0){

lista.innerHTML="<li>🚫 Não há ônibus hoje</li>";
return;

}

horarios.forEach(h=>{

let li=document.createElement("li");

if(h[2]=="passagem"){

li.innerText=h[0]+" — Passando nas moradias";

}else{

li.innerText=h[0]+" — Saída "+h[1];

}

lista.appendChild(li);

});

}


function mostrarChegadas(saida,origem,hora){

let lista=document.getElementById("chegadas");
lista.innerHTML="";

document.getElementById("infoViagem").innerHTML=
"Previsão baseada no ônibus das "+hora+" (saída: "+origem+")";

let rota=(origem.includes("Moradia")) ? rotaMoradia : rotaCampus;

rota.forEach(p=>{

let min=saida+p.t;

let h=Math.floor(min/60);
let m=min%60;

if(m<10)m="0"+m;

let li=document.createElement("li");
li.innerHTML="<b>"+h+":"+m+"</b> - "+p.p;

lista.appendChild(li);

});

}


/* -----------------------------
PRÓXIMO ÔNIBUS
----------------------------- */

  
function atualizar(){
  let agora = new Date();
  let diaAtual = agora.getDay();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();

  // Puxa os horários de hoje
  let horarios = obterHorarios(diaAtual);

  let proximo = null;
  let ultimo = null;

  // 1. Tenta achar o próximo ônibus HOJE
  horarios.forEach(h => {
    let min = minutos(h[0]);
    if(min > atualMin && !proximo){
      proximo = {hora: h[0], origem: h[1], min: min, quando: "hoje"};
    }
    if(min <= atualMin){
      ultimo = {hora: h[0], origem: h[1], min: min};
    }
  });

  // 2. Se não achou hoje, procura nos próximos dias
  if(!proximo){
    let diasNomes = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
    let proximoDia = (diaAtual + 1) % 7;
    
    // Procura até 7 dias para frente
    for(let i = 1; i <= 7; i++){
      let horariosFuturos = obterHorarios(proximoDia);
      
      if(horariosFuturos.length > 0){
        let h = horariosFuturos[0]; // Pega o primeiro ônibus desse dia futuro
        let textoDia = (i === 1) ? "Amanhã" : diasNomes[proximoDia];
        proximo = {hora: h[0], origem: h[1], quando: textoDia};
        break; // Achou o ônibus, para de procurar
      }
      proximoDia = (proximoDia + 1) % 7; // Pula pro próximo dia
    }
  }

  // 3. Atualiza os textos na tela
  if(proximo){
    if(proximo.quando === "hoje"){
      let falta = proximo.min - atualMin;
      document.getElementById("proximo").innerHTML = "🚌 " + proximo.hora;
      document.getElementById("tempo").innerText = formatarTempo(falta);
    } else {
      // Se for de outro dia, muda a forma de mostrar
      document.getElementById("proximo").innerHTML = "🚌 " + proximo.quando + " às " + proximo.hora;
      document.getElementById("tempo").innerText = "As viagens de hoje já encerraram.";
    }
    document.getElementById("origem").innerText = "Saída: " + proximo.origem;
  } else {
    document.getElementById("proximo").innerHTML = "🚫 Sem previsão de ônibus";
    document.getElementById("origem").innerText = "";
    document.getElementById("tempo").innerText = "";
  }

 // 4. Mostra o itinerário do ônibus atual ou do próximo
  if (ultimo) {
    // Descobre qual rota o último ônibus está fazendo para saber o tempo total
    let rotaUltimo = (ultimo.origem.includes("Moradia")) ? rotaMoradia : rotaCampus;
    let tempoTotalViagem = rotaUltimo[rotaUltimo.length - 1].t; 
    let minutoFimDaViagem = ultimo.min + tempoTotalViagem;

    // Se o ônibus atual ainda está no meio do caminho...
    if (atualMin <= minutoFimDaViagem) {
      mostrarChegadas(ultimo.min, ultimo.origem, ultimo.hora);
    } 
    // Se ele já chegou no final, mas ainda tem próximo ônibus hoje...
    else if (proximo && proximo.quando === "hoje") {
      mostrarChegadas(proximo.min, proximo.origem, proximo.hora);
    } 
    // Se ele já terminou e não tem mais nenhum ônibus hoje...
    else {
      document.getElementById("chegadas").innerHTML = "<li>Viagens encerradas no momento.</li>";
      document.getElementById("infoViagem").innerHTML = "";
    }
  } 
  // Se o primeiro ônibus do dia ainda nem saiu...
  else if (proximo && proximo.quando === "hoje") {
    mostrarChegadas(proximo.min, proximo.origem, proximo.hora);
  } else {
    document.getElementById("chegadas").innerHTML = "<li>Aguardando início das viagens...</li>";
    document.getElementById("infoViagem").innerHTML = "";
  }
} // Fim da função atualizar()


  

/* -----------------------------
INICIALIZAÇÃO
----------------------------- */

listarHorarios();
atualizar();

setInterval(atualizar,TEMPO_ATUALIZACAO);

</script>

</body>
</html>
