/* -----------------------------
UTILITÁRIOS
----------------------------- */

function minutos(hora){

let p=hora.split(":");
return parseInt(p[0])*60+parseInt(p[1]);

}

// Cria o formato legível (ex: "1h40" ou "45 min")
function formatarHoraMinuto(min) {
  let h = Math.floor(min / 60);
  let m = min % 60;
  
  // Coloca o zero à esquerda se for menor que 10 (ex: 1h05)
  let mStr = m < 10 ? "0" + m : m;
  
  if (h > 0) {
    return h + "h" + mStr;
  }
  return m + " min";
}

// Usa a função acima e adiciona o texto para o card principal
function formatarTempo(min){
  return "Faltam " + formatarHoraMinuto(min);
}


  
function distancia(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;
}


function calcularTempoNoPonto(nomeDoPonto) {
  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();
  let horarios = horariosHoje(); 
  
  let menorEspera = null;

  for (let h of horarios) {
    let minSaida = minutos(h[0]);
    let origem = h[1];
    let tipo = h[2]; // Puxa o tipo
    
    // NOVA LÓGICA DE ESCOLHA:
    let rota = rotaCampus;
    if (tipo === "passagem") {
      rota = rotaPassagem;
    } else if (origem.includes("Moradia")) {
      rota = rotaMoradia;
    }
  
    // Procura o seu ponto na rota deste ônibus específico
    let pontoNaRota = rota.find(p => p.p === nomeDoPonto);
    
    if (pontoNaRota) {
      let minChegada = minSaida + pontoNaRota.t;
      // Se o ônibus ainda não passou por este ponto
      if (minChegada > atualMin) {
        let espera = minChegada - atualMin;
        if (menorEspera === null || espera < menorEspera) {
          menorEspera = espera;
        }
      }
    }
  }
  return menorEspera;
}  

/* -----------------------------
GPS
----------------------------- */

function pontoMaisProximo(lat,lon){

let melhor=null;
let menor=999;

for(let p of pontos){

if(p.lat==null) continue;

const d=distancia(lat,lon,p.lat,p.lon);

if(d<menor){
menor=d;
melhor=p;
}

}

return {ponto:melhor,dist:menor};

}

  

// Variável global para guardar o "vídeo" do GPS
// Variáveis globais para o mapa
let gpsWatchId = null;
let meuMapa = null;
let marcadorUsuario = null;

function usarGPS(){
  const botao = document.querySelector("button[onclick='usarGPS()']");
  const visor = document.getElementById("gps");
  const divMapa = document.getElementById("mapa");

  if(!navigator.geolocation){
    visor.innerText = "GPS não suportado";
    return;
  }

  if(gpsWatchId !== null){
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
    botao.innerHTML = "📍 Usar minha localização";
    botao.style.background = "#006633";
    visor.innerHTML = "Atualização do GPS pausada.";
    divMapa.style.display = "none"; // Esconde o mapa
    return;
  }

  visor.innerText = "Obtendo localização e carregando mapa...";
  botao.innerHTML = "🛑 Parar localização";
  botao.style.background = "#cc0000";
  divMapa.style.display = "block"; // Mostra o mapa

  // Inicializa o mapa apenas uma vez
  if(meuMapa === null) {
    // Foca inicialmente no centro da UFMG
    meuMapa = L.map('mapa').setView([-19.8690, -43.9664], 14); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '© OpenStreetMap'
    }).addTo(meuMapa);

    // Plota os pontos de ônibus no mapa
    pontos.forEach(p => {
      if(p.lat !== null && p.lon !== null){
        L.marker([p.lat, p.lon])
         .addTo(meuMapa)
         .bindPopup("<b>" + p.nome + "</b>");
      }
    });
  }

  gpsWatchId = navigator.geolocation.watchPosition(
    function(pos){
      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      let r = pontoMaisProximo(lat,lon);
      let espera = calcularTempoNoPonto(r.ponto.nome);

      
      let textoEspera = espera !== null 
        ? "<br><br>🚌 Próximo ônibus aqui em:<br><span style='font-size:24px; color:#006633; font-weight:bold;'>" + formatarHoraMinuto(espera) + "</span>" 
        : "<br><br><span style='font-size:16px; color:red;'>🚫 Sem mais ônibus neste ponto hoje</span>";

      visor.innerHTML =
        "📍 Ponto mais próximo: <b>" + r.ponto.nome + "</b> (" + (r.dist * 1000).toFixed(0) + " m)" + 
        textoEspera;

      
      // Atualiza o usuário no mapa
      if(marcadorUsuario === null){
        marcadorUsuario = L.circleMarker([lat, lon], {
          color: 'blue', fillColor: '#3388ff', fillOpacity: 0.8, radius: 8
        }).addTo(meuMapa).bindPopup("Você está aqui").openPopup();
      } else {
        marcadorUsuario.setLatLng([lat, lon]);
      }
      
      // Centraliza a visão do mapa entre o usuário e o ponto mais próximo
      if(r.ponto.lat !== null) {
        let grupo = new L.featureGroup([marcadorUsuario, L.marker([r.ponto.lat, r.ponto.lon])]);
        meuMapa.fitBounds(grupo.getBounds(), {padding: [30, 30]});
      } else {
        meuMapa.setView([lat, lon], 16);
      }
    },
    function(){
      visor.innerText = "Não foi possível obter a localização";
      navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = null;
      botao.innerHTML = "📍 Usar minha localização";
      botao.style.background = "#006633";
    },
    { enableHighAccuracy: true }
  );
}



  

/* -----------------------------
HORÁRIOS DO DIA E PRÓXIMOS
----------------------------- */

// Lista de feriados fixos de Belo Horizonte e Nacionais (dia/mês)
const feriadosBH = [
  "01/01", // Confraternização Universal
  "21/04", // Tiradentes
  "01/05", // Dia do Trabalhador
  "15/08", // Assunção de Nossa Senhora (BH)
  "07/09", // Independência do Brasil
  "12/10", // Nossa Senhora Aparecida
  "02/11", // Finados
  "15/11", // Proclamação da República
  "08/12", // Imaculada Conceição (BH)
  "25/12"  // Natal
];

function ehFeriado(dataObj) {
  let dia = ("0" + dataObj.getDate()).slice(-2);
  let mes = ("0" + (dataObj.getMonth() + 1)).slice(-2);
  return feriadosBH.includes(dia + "/" + mes);
}

function obterHorarios(dataObj){
  if (ehFeriado(dataObj)) return []; // Se for feriado, zera os ônibus

  let diaDaSemana = dataObj.getDay();
  if(diaDaSemana >= 1 && diaDaSemana <= 5) return horariosSemana;
  if(diaDaSemana == 6) return horariosSabado;
  
  return []; // Domingo
}

function horariosHoje(){
  return obterHorarios(new Date());
}

/* -----------------------------
PRÓXIMO ÔNIBUS
----------------------------- */

  
function atualizar(){
  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();

  // Puxa os horários da data de hoje (passando a variável agora)
  let horarios = obterHorarios(agora);

  let proximo = null;
  let ultimo = null;

  // 1. Tenta achar o próximo ônibus HOJE
  horarios.forEach(h => {
    let min = minutos(h[0]);
    
    if(min > atualMin && !proximo){
      proximo = {hora: h[0], origem: h[1], min: min, quando: "hoje", tipo: h[2]};
    }
    if(min <= atualMin){
      ultimo = {hora: h[0], origem: h[1], min: min, tipo: h[2]};
    }
  });

  // 2. Se não achou hoje, procura nos próximos dias
  if(!proximo){
    let diasNomes = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
    
    // Procura até 7 dias para frente
    for(let i = 1; i <= 7; i++){
      let dataFutura = new Date();
      dataFutura.setDate(agora.getDate() + i);
      
      let horariosFuturos = obterHorarios(dataFutura);
      
      if(horariosFuturos.length > 0){
        let h = horariosFuturos[0]; // Pega o primeiro ônibus desse dia futuro
        let textoDia = (i === 1) ? "Amanhã" : diasNomes[dataFutura.getDay()];
        proximo = {hora: h[0], origem: h[1], quando: textoDia};
        break; // Achou o ônibus, para de procurar
      }
    }
  }

// 3. Atualiza os textos na tela
  if (proximo) {
    if (proximo.quando === "hoje") {
      let falta = proximo.min - atualMin;
      
      // MÁGICA DO AVISO: Verifica se a hora do próximo ônibus é igual à hora do último ônibus da lista de hoje
      let ehOUltimo = (proximo.hora === horarios[horarios.length - 1][0]);
      
      // Cria a etiqueta vermelha se for o último, ou deixa vazio se não for
      let etiquetaAviso = ehOUltimo 
        ? "<div style='background:#cc0000; color:white; padding:6px 10px; border-radius:6px; font-size:14px; font-weight:bold; display:inline-block; margin-bottom:8px;'>⚠️ ATENÇÃO: ÚLTIMO ÔNIBUS DE HOJE</div><br>" 
        : "";

      document.getElementById("proximo").innerHTML = etiquetaAviso + "🚌 " + proximo.hora;
      document.getElementById("tempo").innerText = formatarTempo(falta);
      document.getElementById("origem").innerText = "Saída: " + proximo.origem;
      
    } else {
      // NOVA MÁGICA: Checa se hoje tinha ônibus para definir a mensagem de erro
      let tinhaOnibusHoje = horarios.length > 0;
      let msgErro = tinhaOnibusHoje 
        ? "⚠️ Último ônibus do dia já saiu" 
        : "🚫 Não há ônibus hoje (Domingo/Feriado)";

      document.getElementById("proximo").innerHTML = 
        "<span style='font-size: 20px; color: #cc0000;'>" + msgErro + "</span><br>"+
        "<span class='texto-dia-seguinte' style='font-size: 22px; margin-top: 10px; display: block;'>Próximo: " + proximo.quando.toLowerCase() + " às " + proximo.hora + "</span>";
      document.getElementById("origem").innerText = "Saída: " + proximo.origem;
      document.getElementById("tempo").innerText = ""; 
    }
  } else {
    document.getElementById("proximo").innerHTML = "🚫 Sem previsão de ônibus";
    document.getElementById("origem").innerText = "";
    document.getElementById("tempo").innerText = "";
  }

  
 // 4. Mostra o itinerário do ônibus atual ou do próximo
  if (ultimo) {
    // Descobre qual rota o último ônibus está fazendo para saber o tempo total
    let rotaUltimo = (ultimo.origem.includes("Moradia")) ? rotaMoradia : rotaCampus;
    let tempoTotalViagem = rotaUltimo[rotaUltimo.length - 1].t; 
    let minutoFimDaViagem = ultimo.min + tempoTotalViagem;

    // Se o ônibus atual ainda está no meio do caminho...
    if (atualMin <= minutoFimDaViagem) {
      mostrarChegadas(ultimo.min, ultimo.origem, ultimo.hora, ultimo.tipo);
    } 
    // Se ele já chegou no final, mas ainda tem próximo ônibus hoje...
    else if (proximo && proximo.quando === "hoje") {
      mostrarChegadas(proximo.min, proximo.origem, proximo.hora, proximo.tipo); // Corrigido aqui (era ultimo.tipo)
    } 
    // Se ele já terminou e não tem mais nenhum ônibus hoje...
    else {
      document.getElementById("chegadas").innerHTML = "<li>Viagens encerradas no momento.</li>";
      document.getElementById("infoViagem").innerHTML = "";
    }
  } 
  // Se o primeiro ônibus do dia ainda nem saiu...
  else if (proximo && proximo.quando === "hoje") {
    mostrarChegadas(proximo.min, proximo.origem, proximo.hora, proximo.tipo); // Corrigido aqui também
  } else {
    document.getElementById("chegadas").innerHTML = "<li>Aguardando início das viagens...</li>";
    document.getElementById("infoViagem").innerHTML = "";
  }


estimarPosicaoOnibus();
  
} // Fim da função atualizar()




  
// Variável para guardar o ícone do ônibus no mapa
let marcadorOnibus = null;

function estimarPosicaoOnibus() {
  if (meuMapa === null) return; // Só calcula se o mapa estiver aberto

  let agora = new Date();
  let atualMin = agora.getHours() * 60 + agora.getMinutes();
  
  // Usamos a variável global 'ultimo' que a função atualizar() gera
  if (!ultimo) return; 

  
  let rota = rotaCampus;
  if (ultimo.tipo === "passagem") {
    rota = rotaPassagem;
  } else if (ultimo.origem.includes("Moradia")) {
    rota = rotaMoradia;
  }
  
  let tempoTotal = rota[rota.length - 1].t;
  let minutoFim = ultimo.min + tempoTotal;

  // Se o ônibus já terminou a viagem, remove o ícone
  if (atualMin > minutoFim) {
    if (marcadorOnibus) {
      meuMapa.removeLayer(marcadorOnibus);
      marcadorOnibus = null;
    }
    return;
  }

  let tempoDecorrido = atualMin - ultimo.min;

  // Encontra entre quais pontos ele está
  let pontoAnterior = rota[0];
  let pontoProximo = rota[rota.length - 1];

  for (let i = 0; i < rota.length - 1; i++) {
    if (tempoDecorrido >= rota[i].t && tempoDecorrido < rota[i+1].t) {
      pontoAnterior = rota[i];
      pontoProximo = rota[i+1];
      break;
    }
  }

  // Puxa as coordenadas reais da lista de "pontos"
  let coordAnt = pontos.find(p => p.nome === pontoAnterior.p);
  let coordProx = pontos.find(p => p.nome === pontoProximo.p);

  // Só desenha se tivermos as coordenadas dos dois pontos
  if (coordAnt && coordProx && coordAnt.lat !== null && coordProx.lat !== null) {
    
    // Calcula a porcentagem do trajeto entre esses dois pontos
    let tempoTrecho = pontoProximo.t - pontoAnterior.t;
    let tempoAndadoTrecho = tempoDecorrido - pontoAnterior.t;
    let porcentagem = tempoAndadoTrecho / tempoTrecho;

    // Interpola a Latitude e Longitude (Matemática de linha reta)
    let latAtual = coordAnt.lat + ((coordProx.lat - coordAnt.lat) * porcentagem);
    let lonAtual = coordAnt.lon + ((coordProx.lon - coordAnt.lon) * porcentagem);

    // Cria ou atualiza o ícone do ônibus
    if (!marcadorOnibus) {
      // Cria um ícone personalizado (uma bolinha amarela/laranja)
      let iconeBus = L.divIcon({
        html: '🚌',
        className: '',
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });
      marcadorOnibus = L.marker([latAtual, lonAtual], {icon: iconeBus}).addTo(meuMapa);
      marcadorOnibus.bindPopup("<b>Ônibus das " + ultimo.hora + "</b><br>Estimativa em tempo real");
    } else {
      marcadorOnibus.setLatLng([latAtual, lonAtual]);
    }
  }
}
