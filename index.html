<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ônibus Moradias UFMG</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
color:#006633;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#proximo{
font-size:26px;
font-weight:bold;
}

.verde{color:green}
.amarelo{color:#c98a00}
.vermelho{color:red}

</style>

</head>

<body>

<h1>🚌 Ônibus Moradias UFMG</h1>

<div class="card">
<h2>Próximo ônibus</h2>
<div id="proximo"></div>
<div id="origem"></div>
<div id="tempo"></div>
</div>

<div class="card">
<h2>Chegada estimada nos pontos</h2>
<div id="infoViagem"></div>
<ul id="chegadas"></ul>
</div>

<div class="card">
<h2>Horários de hoje</h2>
<ul id="lista"></ul>
</div>

<div class="card">
<h2>Ponto mais próximo</h2>
<div id="gps">Obtendo localização...</div>
</div>

<script>

/* -----------------------------
CONFIGURAÇÕES
----------------------------- */

const TEMPO_ATUALIZACAO=10000;


/* -----------------------------
ROTAS
----------------------------- */

const rotaCampus=[
{nome:"Escola de Música",t:0},
{nome:"FaE",t:3},
{nome:"FACE",t:5},
{nome:"Reitoria",t:7},
{nome:"CAD 1",t:9},
{nome:"Farmácia",t:11},
{nome:"Odonto",t:13},
{nome:"Educação Física",t:15},
{nome:"Moradia 1",t:21},
{nome:"Moradia 2 e 3",t:24}
];

const rotaMoradia=[
{nome:"Moradia 1",t:0},
{nome:"Moradia 2 e 3",t:2},
{nome:"Educação Física",t:7},
{nome:"Odonto",t:9},
{nome:"Veterinária",t:10},
{nome:"Farmácia",t:11},
{nome:"RU 2",t:12},
{nome:"Engenharia",t:14},
{nome:"RU 1",t:16},
{nome:"FaE",t:18},
{nome:"Belas Artes",t:20},
{nome:"Escola de Música",t:22}
];


/* -----------------------------
HORÁRIOS
----------------------------- */

const horariosSemana=[

["06:45","Moradia"],
["07:20","Escola de Música"],
["07:40","Moradia"],
["10:00","Escola de Música"],
["11:00","Moradia"],
["11:50","Escola de Música"],
["12:15","Moradia"],
["13:10","Escola de Música"],
["13:30","Moradia"],
["15:00","Escola de Música"],
["15:20","Moradia"],
["17:00","Escola de Música"],
["17:20","Moradia"],
["17:50","Escola de Música"],
["18:20","Moradia"],
["19:00","Escola de Música"],
["19:25","Moradias","passagem"],
["19:40","Escola de Música"],
["20:05","Moradias","passagem"],
["21:00","Escola de Música"],
["21:25","Moradias","passagem"],
["21:35","Escola de Música"],
["21:50","Moradias","passagem"],
["22:15","Escola de Música"],
["22:40","Moradias","passagem"],
["22:50","Escola de Música"],
["23:15","Moradias","passagem"]

];

const horariosSabado=[
["07:20","Escola de Música"],
["07:40","Moradia"],
["10:00","Escola de Música"],
["11:00","Moradia"],
["15:00","Escola de Música"],
["15:20","Moradia"],
["19:00","Escola de Música"],
["19:25","Moradias","passagem"]
];


/* -----------------------------
PONTOS PARA GPS
----------------------------- */

const pontos=[

{nome:"Escola de Música",lat:-19.8621,lon:-43.9618},
{nome:"FaE",lat:-19.8682,lon:-43.9636},
{nome:"FACE",lat:-19.8701,lon:-43.9686},
{nome:"Reitoria",lat:-19.8766,lon:-43.9762},
{nome:"Moradia 1",lat:-19.8706,lon:-43.9862},
{nome:"Moradia 2 e 3",lat:-19.8661,lon:-43.9845}

];


/* -----------------------------
UTILITÁRIOS
----------------------------- */

function minutos(hora){

let p=hora.split(":");
return parseInt(p[0])*60+parseInt(p[1]);

}

function formatarTempo(min){

let h=Math.floor(min/60);
let m=min%60;

if(h>0){

if(m<10)m="0"+m;
return "Faltam "+h+":"+m;

}

return "Faltam "+m+" min";

}

function distancia(a,b,c,d){

const R=6371;

let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;

let x=
Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;

let y=2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));

return R*y;

}


/* -----------------------------
GPS
----------------------------- */

function pontoMaisProximo(lat,lon){

let menor=999;
let melhor=null;

pontos.forEach(p=>{

let d=distancia(lat,lon,p.lat,p.lon);

if(d<menor){
menor=d;
melhor=p;
}

});

return {ponto:melhor,dist:menor};

}

function atualizarGPS(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let r=pontoMaisProximo(lat,lon);

document.getElementById("gps").innerText=
"📍 "+r.ponto.nome+" ("+(r.dist*1000).toFixed(0)+" m)";

});

}


/* -----------------------------
HORÁRIOS DO DIA
----------------------------- */

function horariosHoje(){

let dia=new Date().getDay();

if(dia>=1 && dia<=5) return horariosSemana;
if(dia==6) return horariosSabado;

return [];

}


/* -----------------------------
INTERFACE
----------------------------- */

function listarHorarios(){

let lista=document.getElementById("lista");
lista.innerHTML="";

let horarios=horariosHoje();

if(horarios.length==0){

lista.innerHTML="<li>🚫 Não há ônibus hoje</li>";
return;

}

horarios.forEach(h=>{

let li=document.createElement("li");

if(h[2]=="passagem"){

li.innerText=h[0]+" — Passando nas moradias";

}else{

li.innerText=h[0]+" — Saída "+h[1];

}

lista.appendChild(li);

});

}


function mostrarChegadas(saida,origem,hora){

let lista=document.getElementById("chegadas");
lista.innerHTML="";

document.getElementById("infoViagem").innerHTML=
"Previsão baseada no ônibus das "+hora+" (saída: "+origem+")";

let rota=(origem=="Moradia")?rotaMoradia:rotaCampus;

rota.forEach(p=>{

let min=saida+p.t;

let h=Math.floor(min/60);
let m=min%60;

if(m<10)m="0"+m;

let li=document.createElement("li");
li.innerText=p.nome+" → "+h+":"+m;

lista.appendChild(li);

});

}


/* -----------------------------
PRÓXIMO ÔNIBUS
----------------------------- */

function atualizar(){

let horarios=horariosHoje();

if(horarios.length==0){

document.getElementById("proximo").innerHTML="🚫 Sem ônibus hoje";
return;

}

let agora=new Date();
let atualMin=agora.getHours()*60+agora.getMinutes();

let proximo=null;
let ultimo=null;

horarios.forEach(h=>{

let min=minutos(h[0]);

if(min>atualMin && !proximo){
proximo={hora:h[0],origem:h[1],min};
}

if(min<=atualMin){
ultimo={hora:h[0],origem:h[1],min};
}

});

if(proximo){

let falta=proximo.min-atualMin;

document.getElementById("proximo").innerHTML="🚌 "+proximo.hora;
document.getElementById("origem").innerText="Saída: "+proximo.origem;
document.getElementById("tempo").innerText=formatarTempo(falta);

}

if(ultimo){

mostrarChegadas(ultimo.min,ultimo.origem,ultimo.hora);

}

}


/* -----------------------------
INICIALIZAÇÃO
----------------------------- */

listarHorarios();
atualizarGPS();
atualizar();

setInterval(atualizar,TEMPO_ATUALIZACAO);

</script>

</body>
</html>
